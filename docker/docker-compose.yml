# Pantha — Docker Compose
# Self-hosted deployment with PostgreSQL

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: pantha-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: pantha
      POSTGRES_PASSWORD: pantha
      POSTGRES_DB: pantha
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pantha"]
      interval: 10s
      timeout: 5s
      retries: 5

  pantha:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pantha-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://pantha:pantha@postgres:5432/pantha?schema=public"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-change-me-to-a-random-secret}"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
    ports:
      - "3000:3000"

volumes:
  pgdata:
